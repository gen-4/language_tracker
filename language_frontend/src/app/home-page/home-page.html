@if (!isLogged()) {
<div>
  <h2>Catchy line here!</h2>
  <p>Create an account to keep track of your language journey</p>
  <a [routerLink]="['/signup']">Join now</a>
</div>
} @else {

<div>
  @for (resource of resources(); track resource.id) {
  <p>{{ resource.title }}</p>
  } @empty {

  }
</div>
}
